<!DOCTYPE html>
<!--Declara el tipo de documento. Indica al navegador q usara HTML5-->
<html lang="es">
<!--Elemento principal del documento HTML.
lang="es" indica que el contenido esta en "Español"-->

<head> <!--seccion de configuracion del documento-->
    <meta charset="UTF-8">
    <!--Define la codificacion de caracteres.
    UTF-8 permite usar correctamente tildes , ñ, simbolos, etc -->
    <meta name="viewport" content="width=device-width, initial-scale=scale=1.0">
    <!--Hace que el sitio sea responcive.
    Permite q el diseño se adapte corectamente a celulares y tablets-->
    <title>Practicando con mi pene - img y video</title>
    <!--Titulo que aparece en el navegador-->
    <meta name="author" content="el pixula">
    <!--Indica quien creo el sitio web-->

    <link rel="stylesheet" href="static/css/style.css">
    <!--Conexion con hoja CSS de estilos-->
</head>

<body>

</html>
